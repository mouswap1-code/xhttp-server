applications:
  app:
    type: nodejs:20  # Using latest Node.js 20 from Registry matching Dockerfile base image
    build:
      flavor: none  # Explicit build commands preferred over default npm flavor
    hooks:
      build: |
        set -ex
        npm install
    web:
      commands:
        start: node server.js  # Matches package.json start script
      locations:
        /:
          passthru: true  # Pass through to Node.js app for all requests
    variables:
      env:
        NODE_ENV: production  # Production environment

routes:
  https://{default}/:
    type: upstream
    upstream: app:http
