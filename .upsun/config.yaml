applications:
    app:
        type: nodejs:20
        web:
            commands:
                start: node server.js
            locations:
                /:
                    passthru: true
        size: "1:1000"

routes:
    "https://{default}/":
        type: upstream
        upstream: "app:http"
        cache:
            enabled: false
    "http://{default}/":
        type: redirect
        to: "https://{default}/"
