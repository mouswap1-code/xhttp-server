applications:
    app:
        type: nodejs:20
        web:
            commands:
                start: node server.js
            locations:
                /:
                    passthru: true
        size:
            cpu: 1
            memory: 1000
            idle_timeout: 300

routes:
    "https://{default}/":
        type: upstream
        upstream: "app:http"
        cache:
            enabled: true
            default_ttl: 3600
    "http://{default}/":
        type: redirect
        to: "https://{default}/"

resources:
    router:
        cpu: 0.5
        memory: 500
